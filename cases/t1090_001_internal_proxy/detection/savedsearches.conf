[Internal proxy / SOCKS chaining — Detection]
search             = `internal_proxy_chain`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects Internal proxy / SOCKS chaining (T1090.001). See cases/t1090_001_internal_proxy/README.md for the full FP catalogue.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 30m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk on the source host.
action.notable                       = 1
action.notable.param.rule_title      = "T1090.001 Internal proxy / SOCKS chaining: $result.src$"
action.notable.param.rule_description = "Detection T1090.001; see cases/t1090_001_internal_proxy/README.md for the full triage runbook."
action.notable.param.security_domain = "network"
action.notable.param.severity        = "high"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 75}]
action.risk.param._risk_message      = "Internal proxy / SOCKS chaining matched at $result.src$"
