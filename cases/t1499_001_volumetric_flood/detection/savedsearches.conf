[Volumetric Network Flood — Single-Target Connection Burst]
search             = `volumetric_flood`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */1 * * * *
dispatch.earliest_time = -2m
dispatch.latest_time   = now
description        = Detects volumetric network DoS (SYN/UDP/ICMP flood) by aggregating Zeek conn.log records per (1-s window, src, dest, dest_port) and flagging bursts of 100+ connections. ATT&CK T1499.001.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,dest,dest_port
alert.suppress.period = 5m
alert.severity     = 5
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
