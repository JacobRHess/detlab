[DNS Tunnel — High-Entropy Subdomain Volume]
search             = `dns_tunnel_dnscat2`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
description        = Detects DNS tunneling C2 (e.g. dnscat2) by aggregating Zeek dns.log records and flagging high-volume, high-entropy, long-subdomain query patterns to a single base domain. ATT&CK T1071.004.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,base_domain
alert.suppress.period = 30m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
