# Splunk macros used by detlab detections.

[shannon_entropy(1)]
args       = field
definition = eval _s=lower($field$) \
  | rex field=_s max_match=0 "(?<_chars>.)" \
  | eval _n=mvcount(_chars) \
  | stats count AS _c BY _chars _time _key \
  | eventstats sum(_c) AS _N BY _time _key \
  | eval _p=_c/_N \
  | eval _h=-1*_p*ln(_p)/ln(2) \
  | stats sum(_h) AS entropy BY _time _key
iseval     = 0

# Note: Splunk SPL has no native Shannon entropy. The macro above is the
# canonical streamstats approach but is expensive on large volumes. For
# production prefer a custom search command (`| entropy field=subdomain`)
# from a Python custom command, or compute entropy at index time via a
# scripted input. For this lab the macro form is fine.
