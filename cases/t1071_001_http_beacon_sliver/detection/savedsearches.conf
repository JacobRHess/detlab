[HTTP Beaconing — Low-Jitter Periodic Connections]
search             = `http_beacon_jitter`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */10 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time   = now
description        = Detects HTTP/HTTPS beaconing (Sliver, Cobalt Strike, Empire-style) by flagging (src, dest) pairs with high connection count, low average interval, and low coefficient of variation in inter-connection timing. ATT&CK T1071.001.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,dest
alert.suppress.period = 60m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
