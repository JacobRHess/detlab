# Per-case macros for T1213.002 Information-Repository bulk read (Confluence / SharePoint).
# Concatenated into the app's macros.conf by scripts/build_app.py.

[info_repo_bulk_read]
definition = search index=zeek sourcetype=zeek:http host IN ("confluence.lab", "sharepoint.lab", "wiki.lab") \
| stats count AS total_requests, dc(uri) AS distinct_paths, values(uri) AS sample_paths BY _time, src, host \
| rename host AS dest \
| where distinct_paths >= 100 \
| eval case_id="t1213_002_info_repo_bulk", \
       case_title="Information-Repository bulk read (Confluence / SharePoint)", \
       view_name="case_info_repo_bulk", \
       mitre_technique="T1213.002", \
       mitre_tactic="collection", \
       severity="medium"
iseval = 0
