[Information-Repository bulk read (Confluence / SharePoint) — Detection]
search             = `info_repo_bulk_read`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects Information-Repository bulk read (Confluence / SharePoint) (T1213.002). See cases/t1213_002_info_repo_bulk/README.md for the full FP catalogue.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 30m
alert.severity     = 3
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk on the source host.
action.notable                       = 1
action.notable.param.rule_title      = "T1213.002 Information-Repository bulk read (Confluence / SharePoint): $result.src$"
action.notable.param.rule_description = "Detection T1213.002; see cases/t1213_002_info_repo_bulk/README.md for the full triage runbook."
action.notable.param.security_domain = "network"
action.notable.param.severity        = "medium"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 50}]
action.risk.param._risk_message      = "Information-Repository bulk read (Confluence / SharePoint) matched at $result.src$"
