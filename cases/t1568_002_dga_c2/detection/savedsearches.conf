[DGA C2 — High-Cardinality NXDOMAIN Bursts]
search             = `dga_c2_lookup`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
description        = Detects DGA-driven C2 malware (Conficker, Necurs, Murofet) by aggregating Zeek dns.log records and flagging sources that fire many distinct high-entropy base-domain queries with majority NXDOMAIN. ATT&CK T1568.002.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 60m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
