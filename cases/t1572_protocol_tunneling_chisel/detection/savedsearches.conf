[Protocol Tunneling — Long-Lived High-Throughput HTTP/S Flow]
search             = `protocol_tunnel_chisel`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects HTTP/HTTPS protocol tunneling (chisel, gost, wstunnel) by flagging single Zeek conn.log records with multi-minute duration and multi-megabyte bidirectional throughput on standard web ports. ATT&CK T1572.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,dest
alert.suppress.period = 60m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
