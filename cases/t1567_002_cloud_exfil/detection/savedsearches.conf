[Cloud Storage Exfiltration — High Uplink to Known Cloud-Storage IPs]
search             = `cloud_exfil`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects data staging to cloud-storage / file-sharing services. Two-signal: destination IP matches the cloud_storage_ips.csv lookup AND cumulative uplink bytes >= 50 MB per (src, service) over a 1-h window. ATT&CK T1567.002. Modern ransomware staging pattern.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,cloud_service
alert.suppress.period = 60m
alert.severity     = 5
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk for the source host. The
# destination is a third-party SaaS so we don't risk-score it; only the
# compromised internal source matters.
action.notable                       = 1
action.notable.param.rule_title      = "T1567.002 Cloud Exfil: $result.src$ -> $result.cloud_service$"
action.notable.param.rule_description = "$result.total_orig_bytes$ bytes uplink to $result.cloud_service$ across $result.record_count$ records (avg $result.avg_orig_bytes_per_record$ bytes/record)."
action.notable.param.security_domain = "network"
action.notable.param.severity        = "critical"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 85}]
action.risk.param._risk_message      = "Cloud-storage exfil staging: $result.total_orig_bytes$ bytes to $result.cloud_service$"
action.risk.param._risk_threats      = [{"threat_object_field": "cloud_service", "threat_object_type": "service"}]
