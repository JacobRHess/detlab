title: SMB admin shares (psexec / wmiexec) — T1021.002
id: 8e3a4d2c-7b1f-46e9-a5c4-9d2e6b3f1a8c
status: experimental
description: |
  Detects SMB admin shares (psexec / wmiexec) (T1021.002). Sigma cannot natively express the per-window
  aggregate this rule depends on; the SPL companion in detlab handles
  the aggregation. This rule expresses the per-event signal for SIEM-
  side aggregation to work on.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://github.com/JacobRHess/detlab/blob/main/cases/t1021_002_smb_lateral/README.md
author: Jacob Hess
date: 2026-05-06
tags:
  - attack.lateral_movement
  - attack.t1021_002
logsource:
  product: zeek
  service: conn
detection:
  selection:
    '*': '*'
  condition: selection
falsepositives:
  - Backup software hitting many file shares on a schedule
  - Patching / config-management orchestration (Ansible, GPO push)
  - Bastion / jump hosts that fan out to many backends
level: high
