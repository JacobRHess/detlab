[SMB admin shares (psexec / wmiexec) — Detection]
search             = `smb_lateral`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects SMB admin shares (psexec / wmiexec) (T1021.002). See cases/t1021_002_smb_lateral/README.md for the full FP catalogue.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 30m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk on the source host.
action.notable                       = 1
action.notable.param.rule_title      = "T1021.002 SMB admin shares (psexec / wmiexec): $result.src$"
action.notable.param.rule_description = "Detection T1021.002; see cases/t1021_002_smb_lateral/README.md for the full triage runbook."
action.notable.param.security_domain = "network"
action.notable.param.severity        = "high"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 75}]
action.risk.param._risk_message      = "SMB admin shares (psexec / wmiexec) matched at $result.src$"
