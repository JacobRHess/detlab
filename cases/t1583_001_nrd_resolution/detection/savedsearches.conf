[Newly-Registered Domain (NRD) resolution — Detection]
search             = `nrd_resolution`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects Newly-Registered Domain (NRD) resolution (T1583.001). See cases/t1583_001_nrd_resolution/README.md for the full FP catalogue.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 30m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk on the source host.
action.notable                       = 1
action.notable.param.rule_title      = "T1583.001 Newly-Registered Domain (NRD) resolution: $result.src$"
action.notable.param.rule_description = "Detection T1583.001; see cases/t1583_001_nrd_resolution/README.md for the full triage runbook."
action.notable.param.security_domain = "network"
action.notable.param.severity        = "high"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 75}]
action.risk.param._risk_message      = "Newly-Registered Domain (NRD) resolution matched at $result.src$"
