[Remote Access Software (RMM) — DNS Resolution]
search             = `rmm_tool_use`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
description        = Detects DNS resolution of known Remote Monitoring & Management (RMM) tool domains. Modern ransomware crews abuse TeamViewer, AnyDesk, ScreenConnect, ConnectWise for hands-on-keyboard operations. ATT&CK T1219.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 60m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security risk-based alerting (RBA): emit a risk event
# per (src, tools) so this contributes to the host's running risk score
# instead of producing notable noise. Tune the risk_score field to match
# your environment's RBA scaling.
action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 60}]
action.risk.param._risk_message      = "RMM tool DNS resolution observed: $result.tools$"
action.risk.param._risk_threats      = [{"threat_object_field": "tools", "threat_object_type": "service"}]
