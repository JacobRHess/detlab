[Lateral Tool Transfer — Detection]
search             = `lateral_tool_transfer`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects Lateral Tool Transfer (T1570). See cases/t1570_lateral_tool_transfer/README.md for the full FP catalogue.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 30m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk on the source host.
action.notable                       = 1
action.notable.param.rule_title      = "T1570 Lateral Tool Transfer: $result.src$"
action.notable.param.rule_description = "Detection T1570; see cases/t1570_lateral_tool_transfer/README.md for the full triage runbook."
action.notable.param.security_domain = "network"
action.notable.param.severity        = "high"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 75}]
action.risk.param._risk_message      = "Lateral Tool Transfer matched at $result.src$"
