[SSH Brute Force — High-Rate Short SSH Connections]
search             = `ssh_brute_force`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
description        = Detects SSH password-guessing attacks (hydra, medusa, ncrack) by aggregating Zeek conn.log records and flagging single (src, dest) pairs with 20+ short connections to TCP/22 in a 60-s window. ATT&CK T1110.001.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,dest
alert.suppress.period = 30m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
