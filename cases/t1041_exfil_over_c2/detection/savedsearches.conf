[Exfiltration Over C2 Channel — Beacon + High Uplink Bytes]
search             = `c2_exfil`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Chained detection — fires when a (src, dest) pair flagged by `http_beacon_jitter` also moves >= 100 KB uplink in a window. Risk-accumulation pattern combining behavioural (beaconing) and volumetric (uplink-bytes) signals. ATT&CK T1041.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,dest
alert.suppress.period = 60m
alert.severity     = 5
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk. Both endpoints get risk —
# the source is the compromised host, the destination is the C2 server,
# and SOC analysts work both objects.
action.notable                       = 1
action.notable.param.rule_title      = "T1041 Exfil over C2: $result.src$ -> $result.dest$"
action.notable.param.rule_description = "Beacon to $result.dest$ ($result.beacon_connection_count$ conns, avg interval $result.beacon_avg_interval_seconds$s) carried $result.total_orig_bytes$ bytes uplink across $result.exfil_record_count$ records."
action.notable.param.security_domain = "network"
action.notable.param.severity        = "critical"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 90}, {"risk_object_field": "dest", "risk_object_type": "system", "risk_score": 75}]
action.risk.param._risk_message      = "C2 channel exfiltration: $result.total_orig_bytes$ bytes uplink to known beacon dest"
