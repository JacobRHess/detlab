title: RPC coercion (PetitPotam, DFSCoerce) — T1068
id: 5d8c2a4f-3e7b-49c1-b6a2-1f3d8e7a5b9c
status: experimental
description: |
  Detects RPC coercion (PetitPotam, DFSCoerce) (T1068). Sigma cannot natively express the per-window
  aggregate this rule depends on; the SPL companion in detlab handles
  the aggregation. This rule expresses the per-event signal for SIEM-
  side aggregation to work on.
references:
  - https://attack.mitre.org/techniques/T1068/
  - https://github.com/JacobRHess/detlab/blob/main/cases/t1068_rpc_coercion/README.md
author: Jacob Hess
date: 2026-05-06
tags:
  - attack.privilege_escalation
  - attack.t1068
logsource:
  product: zeek
  service: dce_rpc
detection:
  selection_coercion_op:
    operation:
      - 'EfsRpcOpenFileRaw'
      - 'EfsRpcDecryptFileSrv'
      - 'EfsRpcEncryptFileSrv'
      - 'NetrDfsAddStdRoot'
      - 'NetrDfsRemoveStdRoot'
  condition: selection_coercion_op
falsepositives:
  - Domain controllers replicating to each other — allowlist DC↔DC pairs
  - Backup software using EFSRPC for shadow-copy enumeration
  - Internal pen-test / red-team engagements
level: critical
