# Per-case macros for T1068 RPC coercion (PetitPotam, DFSCoerce).
# Concatenated into the app's macros.conf by scripts/build_app.py.

[rpc_coercion]
definition = search index=zeek sourcetype=zeek:dce_rpc operation IN ("EfsRpcOpenFileRaw", "EfsRpcDecryptFileSrv", "EfsRpcEncryptFileSrv", "NetrDfsAddStdRoot", "NetrDfsRemoveStdRoot") \
| bin _time span=600s \
| stats count AS total_calls, dc(operation) AS distinct_operations, values(operation) AS sample_operations BY _time, src, "id.resp_h" \
| rename "id.resp_h" AS dest \
| where distinct_operations >= 1 \
| eval case_id="t1068_rpc_coercion", \
       case_title="RPC coercion (PetitPotam, DFSCoerce)", \
       view_name="case_rpc_coercion", \
       mitre_technique="T1068", \
       mitre_tactic="privilege-escalation", \
       severity="critical"
iseval = 0
