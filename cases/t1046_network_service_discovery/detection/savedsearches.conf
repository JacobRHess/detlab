[Network Service Discovery — High-Cardinality Port Probing]
search             = `network_service_discovery`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
description        = Detects TCP port scanning (nmap, masscan) by aggregating Zeek conn.log records and flagging (src, dest) pairs with high distinct-port cardinality and a high fraction of incomplete sessions. ATT&CK T1046.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,dest
alert.suppress.period = 30m
alert.severity     = 3
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
