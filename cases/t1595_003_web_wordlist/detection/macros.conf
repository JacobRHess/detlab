# Per-case macros for T1595.003 Web wordlist scanning.
# Concatenated into the app's macros.conf by scripts/build_app.py.

[web_wordlist_scan]
definition = search index=zeek sourcetype=zeek:http status_code=404 \
| bin _time span=60s \
| stats count AS total_404s, dc(uri) AS distinct_404_paths, values(uri) AS sample_uris BY _time, src, host \
 \
| where distinct_404_paths >= 50 \
| eval case_id="t1595_003_web_wordlist", \
       case_title="Web wordlist scanning", \
       view_name="case_web_wordlist", \
       mitre_technique="T1595.003", \
       mitre_tactic="reconnaissance", \
       severity="medium"
iseval = 0
