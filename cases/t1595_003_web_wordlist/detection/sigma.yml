title: Web wordlist scanning — T1595.003
id: 5b1d8e7a-3c4f-4a6b-9e1d-2f8a5b7c4d3e
status: experimental
description: |
  Detects Web wordlist scanning (T1595.003). Sigma cannot natively express the per-window
  aggregate this rule depends on; the SPL companion in detlab handles
  the aggregation. This rule expresses the per-event signal for SIEM-
  side aggregation to work on.
references:
  - https://attack.mitre.org/techniques/T1595/003/
  - https://github.com/JacobRHess/detlab/blob/main/cases/t1595_003_web_wordlist/README.md
author: Jacob Hess
date: 2026-05-06
tags:
  - attack.reconnaissance
  - attack.t1595_003
logsource:
  product: zeek
  service: http
detection:
  selection:
    '*': '*'
  condition: selection
falsepositives:
  - Search engines / good-citizen crawlers (allowlist by User-Agent)
  - Internal QA / functional-testing harnesses
  - Stale browser bookmarks for a relaunched app
level: medium
