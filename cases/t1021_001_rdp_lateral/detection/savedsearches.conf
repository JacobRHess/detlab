[RDP Lateral Movement — Multi-Destination Pivot]
search             = `rdp_lateral`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
description        = Detects RDP lateral movement (T1021.001) by aggregating Zeek conn.log records to TCP/3389 per (src, 1-h window) and flagging sources that touched 3+ distinct internal destinations. Modern ransomware lateral pattern.
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src
alert.suppress.period = 60m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than

# Splunk Enterprise Security: notable + risk on the source host. Do NOT
# risk-score the dests — they're the victim machines, and SOC analysts
# triage by attacker source.
action.notable                       = 1
action.notable.param.rule_title      = "T1021.001 RDP Lateral: $result.src$ -> $result.distinct_destinations$ hosts"
action.notable.param.rule_description = "$result.src$ touched $result.distinct_destinations$ distinct internal hosts via RDP in $result.duration_seconds$ s. Sample dests: $result.sample_destinations$"
action.notable.param.security_domain = "network"
action.notable.param.severity        = "high"

action.risk                          = 1
action.risk.param._risk              = [{"risk_object_field": "src", "risk_object_type": "system", "risk_score": 75}]
action.risk.param._risk_message      = "RDP lateral pivot: $result.distinct_destinations$ distinct internal destinations"
