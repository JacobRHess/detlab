[DNS Exfiltration — High-Volume Subdomain Bytes]
search             = `dns_exfil_volume`
disabled           = 0
is_scheduled       = 1
cron_schedule      = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
description        = Detects DNS exfiltration (iodine, dnsteal) by aggregating Zeek dns.log records and flagging sustained high subdomain-byte rate per (src, base_domain). ATT&CK T1048.003. Complementary to T1071.004 dnscat2 (different qtype + threshold profile).
action.email       = 0
alert.suppress     = 1
alert.suppress.fields = src,base_domain
alert.suppress.period = 30m
alert.severity     = 4
alert_type         = number of events
alert_threshold    = 0
alert_comparator   = greater than
counttype          = number of events
quantity           = 0
relation           = greater than
