# Shared macros — concatenated by build_app.py with per-case macros into
# app/default/macros.conf. Per-case detection macros live in
# cases/<id>/detection/macros.conf.

[detlab_all_alerts]
definition = `dns_tunnel_dnscat2` \
| append [| `http_beacon_jitter`] \
| append [| `network_service_discovery`] \
| append [| `protocol_tunnel_chisel`]
iseval = 0

# Splunk SPL has no native Shannon entropy. We use a cheap proxy: unique
# character count in the subdomain. Random base32 -> 20+ uniq chars; English
# words / short labels -> <8. Combined with length/volume gates this gives
# the same separation as true entropy in our test fixtures. The Python
# detector (src/detlab/detector.py) uses true Shannon entropy and is the
# more precise spec; SPL is expected to fire on a superset of those hits.
