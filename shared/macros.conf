# Shared macros — concatenated by build_app.py with per-case macros into
# app/default/macros.conf. Per-case detection macros live in
# cases/<id>/detection/macros.conf.

[detlab_kill_chain]
definition = `detlab_all_alerts` \
| stats min(_time) AS earliest_ts, max(_time) AS latest_ts, dc(case_id) AS technique_count, dc(mitre_tactic) AS tactic_count, values(case_id) AS techniques, values(mitre_tactic) AS tactics, values(case_title) AS case_titles BY src \
| where technique_count >= 2 \
| eval duration_seconds = latest_ts - earliest_ts \
| eval severity = case(technique_count >= 5, "critical", technique_count >= 3, "high", true(), "medium") \
| eval mitre_technique="META", \
       mitre_tactic="multi", \
       case_id="killchain", \
       case_title="Kill chain — multiple ATT&CK techniques on one source"
iseval = 0

[detlab_all_alerts]
definition = `dns_tunnel_dnscat2` \
| append [| `http_beacon_jitter`] \
| append [| `network_service_discovery`] \
| append [| `protocol_tunnel_chisel`] \
| append [| `tor_relay_use`] \
| append [| `dns_exfil_volume`] \
| append [| `ssh_brute_force`] \
| append [| `dga_c2_lookup`] \
| append [| `rmm_tool_use`] \
| append [| `volumetric_flood`] \
| append [| `suricata_exploit_attempt`] \
| append [| `c2_exfil`] \
| append [| `cloud_exfil`] \
| append [| `rdp_lateral`] \
| append [| `web_wordlist_scan`] \
| append [| `internal_proxy_chain`] \
| append [| `smb_lateral`] \
| append [| `lateral_tool_transfer`] \
| append [| `external_remote_services`] \
| append [| `nrd_resolution`] \
| append [| `info_repo_bulk_read`] \
| append [| `vuln_scanning`] \
| append [| `html_smuggling`] \
| append [| `rpc_coercion`]
iseval = 0

# CIM helper macros — reusable Common Information Model field aliasing for
# downstream Splunk Enterprise Security data models. Detection cases that
# care about CIM compliance can `| `detlab_cim_zeek_conn`` after their
# index search to normalise field names.

[detlab_cim_zeek_conn]
definition = rename "id.orig_h" AS src, "id.orig_p" AS src_port, "id.resp_h" AS dest, "id.resp_p" AS dest_port, orig_bytes AS bytes_out, resp_bytes AS bytes_in, proto AS transport, service AS app | eval bytes = coalesce(bytes_out, 0) + coalesce(bytes_in, 0) | eval action = case('conn_state' = "SF", "allowed", 'conn_state' IN ("REJ","RSTR","RSTRH"), "blocked", true(), "unknown")
iseval = 0

[detlab_cim_zeek_dns]
definition = rename "id.orig_h" AS src, "id.resp_h" AS dest, "id.resp_p" AS dest_port, query AS query, qtype_name AS query_type, rcode_name AS reply_code | eval message_type = "Query"
iseval = 0

# Splunk SPL has no native Shannon entropy. We use a cheap proxy: unique
# character count in the subdomain. Random base32 -> 20+ uniq chars; English
# words / short labels -> <8. Combined with length/volume gates this gives
# the same separation as true entropy in our test fixtures. The Python
# detector (src/detlab/detector.py) uses true Shannon entropy and is the
# more precise spec; SPL is expected to fire on a superset of those hits.
