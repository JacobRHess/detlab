# Sourcetype handling for Zeek (JSON) and Suricata (eve.json).
# Field aliases bring Zeek's dotted names in line with the Splunk CIM/Zeek TA
# (id.orig_h -> src, id.resp_h -> dest) so detections can use src/dest portably.

[zeek:dns]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false
TRUNCATE            = 0

FIELDALIAS-zeek-dns-src  = id.orig_h AS src
FIELDALIAS-zeek-dns-dest = id.resp_h AS dest

[zeek:conn]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false

FIELDALIAS-zeek-conn-src  = id.orig_h AS src
FIELDALIAS-zeek-conn-dest = id.resp_h AS dest

[zeek:http]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false

[zeek:ssl]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false

[suricata:eve]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "timestamp":
TIME_FORMAT         = %Y-%m-%dT%H:%M:%S.%6N%z
SHOULD_LINEMERGE    = false
