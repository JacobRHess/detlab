# detlab indexes — separate indexes per sensor make ACLs and retention easy.

[zeek]
homePath   = $SPLUNK_DB/zeek/db
coldPath   = $SPLUNK_DB/zeek/colddb
thawedPath = $SPLUNK_DB/zeek/thaweddb

[suricata]
homePath   = $SPLUNK_DB/suricata/db
coldPath   = $SPLUNK_DB/suricata/colddb
thawedPath = $SPLUNK_DB/suricata/thaweddb

[wineventlog]
homePath   = $SPLUNK_DB/wineventlog/db
coldPath   = $SPLUNK_DB/wineventlog/colddb
thawedPath = $SPLUNK_DB/wineventlog/thaweddb
