# Sourcetype handling for Zeek (JSON) and Suricata (eve.json).
#
# Shipped inside the .spl tarball so the detlab app works in any Splunk
# install — not just the lab's docker-compose stack. Mirrors the
# lab/splunk/props.conf used by the lab Splunk container, with one extra
# wrinkle: the EXTRACT lines pull common Suricata alert subfields out of
# the nested JSON so they're searchable as flat field names.

[zeek:dns]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false
TRUNCATE            = 0

# CIM alignment — bring Zeek's dotted names in line with src/dest.
FIELDALIAS-zeek-dns-src       = id.orig_h AS src
FIELDALIAS-zeek-dns-dest      = id.resp_h AS dest
FIELDALIAS-zeek-dns-dest-port = id.resp_p AS dest_port
FIELDALIAS-zeek-dns-src-port  = id.orig_p AS src_port

[zeek:conn]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false

FIELDALIAS-zeek-conn-src       = id.orig_h AS src
FIELDALIAS-zeek-conn-dest      = id.resp_h AS dest
FIELDALIAS-zeek-conn-dest-port = id.resp_p AS dest_port
FIELDALIAS-zeek-conn-src-port  = id.orig_p AS src_port
# CIM Network_Traffic compliance — alias bytes/transport.
FIELDALIAS-zeek-conn-bytes-out = orig_bytes AS bytes_out
FIELDALIAS-zeek-conn-bytes-in  = resp_bytes AS bytes_in
FIELDALIAS-zeek-conn-transport = proto AS transport

[zeek:http]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false

FIELDALIAS-zeek-http-src  = id.orig_h AS src
FIELDALIAS-zeek-http-dest = id.resp_h AS dest

[zeek:ssl]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "ts":
TIME_FORMAT         = %s.%6N
SHOULD_LINEMERGE    = false

FIELDALIAS-zeek-ssl-src  = id.orig_h AS src
FIELDALIAS-zeek-ssl-dest = id.resp_h AS dest

[suricata:eve]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TIME_PREFIX         = "timestamp":
TIME_FORMAT         = %Y-%m-%dT%H:%M:%S.%6N%z
SHOULD_LINEMERGE    = false

# Surface nested alert/http subfields as flat names so dashboards / saved
# searches don't need 'alert.category' quoting throughout.
FIELDALIAS-suricata-src                 = src_ip AS src
FIELDALIAS-suricata-dest                = dest_ip AS dest
EVAL-alert_category    = 'alert.category'
EVAL-alert_signature   = 'alert.signature'
EVAL-alert_severity    = 'alert.severity'
EVAL-alert_signature_id = 'alert.signature_id'
